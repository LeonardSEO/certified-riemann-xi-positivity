name: verify-certificate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  certificate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: code/requirements.txt

      - name: Install pinned dependency
        run: python -m pip install --requirement code/requirements.txt

      - name: Run interval certificate
        run: |
          set -o pipefail
          python code/theta_moment_certificate.py | tee certificate-current.out
          grep -Fx "ALL CERTIFICATE ASSERTIONS PASSED" certificate-current.out

      - name: Check published artifact hashes
        run: sha256sum --check certificates/SHA256SUMS

  paper:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install the documented TeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            latexmk lmodern texlive-fonts-recommended texlive-latex-extra texlive-science

      - name: Compile the paper
        working-directory: paper
        run: latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: certified-riemann-xi-positivity-paper
          path: paper/main.pdf
          if-no-files-found: error
